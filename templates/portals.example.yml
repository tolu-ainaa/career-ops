# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Motion Design & Animation --
    - "Motion Designer"
    - "Motion Design"
    - "Motion Graphics"
    - "Animation Director"
    - "Animator"
    - "Motion Artist"
    - "2D Animator"
    - "After Effects"
    # -- AR / VR / XR --
    - "AR Developer"
    - "AR Engineer"
    - "XR Developer"
    - "VR Developer"
    - "Immersive"
    - "Spatial"
    - "Mixed Reality"
    - "Extended Reality"
    - "Unity Developer"
    - "Lens Studio"
    # -- Creative Technologist --
    - "Creative Technologist"
    - "Creative Technology"
    - "Creative Developer"
    - "Creative Coder"
    - "Technical Artist"
    - "Technical Creative"
    # -- Brand & Visual Identity --
    - "Brand Designer"
    - "Brand Identity"
    - "Visual Identity"
    - "Identity Designer"
    - "Graphic Designer"
    - "Visual Designer"
    # -- Video & Content Production --
    - "Video Editor"
    - "Video Producer"
    - "Content Creator"
    - "Creative Producer"
    - "Social Media Creator"
    - "Content Production"
    # -- Creative Direction --
    - "Creative Director"
    - "Head of Design"
    - "Head of Creative"
    - "Design Director"
    - "Art Director"
    # -- Design (general) --
    - "UI Designer"
    - "UX Designer"
    - "Product Designer"
    - "Digital Designer"
    # -- Creative Strategy --
    - "Creative Strategist"
    - "Creative Strategy"
  negative:
    # Exclude roles outside Tolu's focus
    - "Junior"
    - "Intern"
    - "Internship"
    - "Graduate Scheme"
    - "Print only"
    - "Accountant"
    - "Finance"
    - "Legal"
    - "HR Manager"
    - "Recruiter"
    - "Sales Representative"
    - "Software Engineer"
    - "Backend"
    - "DevOps"
    - "Data Engineer"
    - "Data Scientist"
    - "Machine Learning Engineer"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "SAP "
    - "Embedded"
    - "Firmware"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Lead"
    - "Head"
    - "Principal"
    - "Director"
    - "Staff"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:
  # -- Ashby — Creative & Motion --
  - name: Ashby — Motion Designer
    query: 'site:jobs.ashbyhq.com "Motion Designer" OR "Motion Graphics" OR "Animation Director" remote OR "United Kingdom"'
    enabled: true

  - name: Ashby — Creative Technologist
    query: 'site:jobs.ashbyhq.com "Creative Technologist" OR "Creative Developer" OR "Technical Artist" remote'
    enabled: true

  - name: Ashby — AR/VR/XR Developer
    query: 'site:jobs.ashbyhq.com "AR Developer" OR "XR Developer" OR "VR Developer" OR "Unity Developer" OR "Immersive" remote'
    enabled: true

  - name: Ashby — Brand & Visual Designer
    query: 'site:jobs.ashbyhq.com "Brand Designer" OR "Brand Identity" OR "Visual Designer" OR "Art Director" remote'
    enabled: true

  - name: Ashby — Video Editor & Creative Producer
    query: 'site:jobs.ashbyhq.com "Video Editor" OR "Creative Producer" OR "Content Creator" remote OR "United Kingdom"'
    enabled: true

  # -- Greenhouse — Creative & Motion --
  - name: Greenhouse — Motion Designer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Motion Designer" OR "Motion Graphics" OR "Animator" remote'
    enabled: true

  - name: Greenhouse — Creative Technologist
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Creative Technologist" OR "Technical Artist" OR "XR" OR "AR Developer"'
    enabled: true

  - name: Greenhouse — Brand & Visual Identity
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Brand Designer" OR "Identity Designer" OR "Creative Director" remote'
    enabled: true

  - name: Greenhouse — Video Editor
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Video Editor" OR "Creative Producer" OR "Social Content" remote'
    enabled: true

  # -- Lever — Creative Roles --
  - name: Lever — Motion & Creative
    query: 'site:jobs.lever.co "Motion Designer" OR "Creative Technologist" OR "Brand Designer" OR "Video Editor" remote'
    enabled: true

  - name: Lever — AR/XR
    query: 'site:jobs.lever.co "AR Developer" OR "XR" OR "Immersive" OR "Unity" "Designer" OR "Developer" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Creative Tech Startups
    query: 'site:wellfound.com "Motion Designer" OR "Creative Technologist" OR "Brand Designer" OR "AR" remote'
    enabled: true

  # -- UK-specific job boards --
  - name: The Dots — Motion & Creative
    query: 'site:the-dots.com "Motion Designer" OR "Creative Technologist" OR "Brand Designer" "United Kingdom" OR "London" OR "Belfast" OR "remote"'
    enabled: true

  - name: Creativepool — Motion & Design
    query: 'site:creativepool.com "Motion Designer" OR "Motion Graphics" OR "Creative Technologist" UK OR remote'
    enabled: true

  - name: Workable — Creative Roles UK
    query: 'site:apply.workable.com "Motion Designer" OR "Creative Technologist" OR "Brand Designer" OR "Video Editor" "United Kingdom" OR remote'
    enabled: true

  # -- Games & Interactive --
  - name: Games jobs — Technical Artist & AR
    query: '"Technical Artist" OR "VFX Artist" OR "Unity Developer" "game" OR "studio" remote OR "United Kingdom" site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  # -- Social & Content Platforms --
  - name: Social Platforms — Creative Roles
    query: '"Creative Strategist" OR "Creative Producer" OR "Motion Designer" "TikTok" OR "Meta" OR "Snap" OR "YouTube" remote'
    enabled: true

  # -- Snap AR / Lens Studio specific --
  - name: Snap Inc — AR & Creative
    query: 'site:snap.com/en-US/jobs "AR" OR "Lens" OR "Creative Technologist" OR "Motion Designer"'
    enabled: true

